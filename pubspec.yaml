name: unifytechxenoscaixa
description: "UnifyTech Xenos - PDV Caixa Desktop"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State Management (Riverpod)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP
  http: ^1.3.0

  # Typography
  google_fonts: ^6.2.1

  # Local Storage
  shared_preferences: ^2.5.3

  # Internationalization (date/currency)
  intl: ^0.20.2

  # Audio feedback
  audioplayers: ^6.4.0

  # AI & Path management
  google_generative_ai: ^0.4.0
  path_provider: ^2.1.0

  # Icons
  cupertino_icons: ^1.0.8
  printing: ^5.14.3
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation (Riverpod)
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.5

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/images/
